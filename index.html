<style>
:root{--bg:#faf8f3;--bg2:#f1ede4;--panel:#f4f1ea;--ink:#16171b;--muted:#6b6c72;--gold:#F2A900;--gold-2:#ffce5e;--gold-deep:#b97f00;--line:rgba(20,22,26,.10);
 --sans:"Geist",system-ui,sans-serif;--mono:"Geist Mono",ui-monospace,monospace;--serif:"Playfair Display",Georgia,serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100dvh;position:relative;overflow-x:hidden}
/* brand overlay: the official gold ACHIEVEMOR mark, baked in faintly behind everything */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.06;
  background:url(achv_logo.png) no-repeat; background-position:18% 120%; background-size:min(62vw,720px)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(55% 45% at 82% 38%, rgba(242,169,0,.10), transparent 62%)}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 clamp(20px,3.5vw,40px)}

/* nav */
.nav{display:flex;align-items:center;gap:14px;height:78px}
.logo{display:flex;align-items:center;gap:12px}
.logo img{height:34px;width:auto}
.logo .wm{font-weight:700;font-size:20px;letter-spacing:.22em;color:var(--ink)}
.nav .sp{flex:1}
.nav .mk{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.enter{margin-left:18px;font-size:13.5px;font-weight:600;color:#1a1305;background:linear-gradient(180deg,var(--gold-2),var(--gold));border:none;border-radius:11px;padding:11px 20px;cursor:pointer}

/* hero */
.hero{display:grid;grid-template-columns:1fr 1.05fr;gap:24px;align-items:center;min-height:calc(100dvh - 78px);padding-bottom:30px}
.eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);font-weight:600}
h1{font-family:var(--serif);font-weight:700;font-size:clamp(40px,6.4vw,76px);line-height:.98;margin:18px 0 0;letter-spacing:-.01em}
.byline{font-family:var(--serif);font-weight:700;font-size:clamp(22px,3vw,34px);color:var(--gold-deep);margin-top:10px;white-space:nowrap}
.sub{font-size:clamp(15px,1.7vw,18px);color:var(--muted);margin-top:22px;max-width:430px;line-height:1.55}
.cta{display:inline-flex;align-items:center;gap:10px;margin-top:30px;font-weight:600;font-size:15px;color:#1a1305;background:linear-gradient(180deg,var(--gold-2),var(--gold));border-radius:13px;padding:15px 26px;box-shadow:0 16px 36px -16px rgba(242,169,0,.55)}
.cta2{margin-left:14px;color:var(--ink);border:1px solid var(--line);background:var(--bg);border-radius:13px;padding:15px 22px;font-weight:600;font-size:15px}
.squad{position:relative;display:grid;place-items:center}
.squad img{width:100%;max-width:560px;filter:drop-shadow(0 26px 48px rgba(20,22,26,.28))}
.foot{display:flex;align-items:center;gap:14px;padding:18px 0 26px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.foot .gp{display:inline-flex;gap:5px}.foot .gp i{width:14px;height:3px;border-radius:2px;background:var(--gold)}

@media (max-width:780px){ .hero{grid-template-columns:1fr;text-align:center;min-height:0;padding:20px 0 40px} .squad{order:-1} .nav .mk{display:none} }
</style></head>
