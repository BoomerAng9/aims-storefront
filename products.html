<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products — A.I.M.S. MARKETPLACE by: ACHIEVEMOR</title>
<meta name="description" content="Digital products and services from ACHIEVEMOR — apps, managed AI, consulting, and courses.">
<link rel="canonical" href="https://aims.business/products.html">
<meta name="theme-color" content="#16171b">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="A.I.M.S. MARKETPLACE">
<meta property="og:title" content="Products — A.I.M.S. MARKETPLACE by: ACHIEVEMOR">
<meta property="og:description" content="Digital products and services by ACHIEVEMOR.">
<meta property="og:url" content="https://aims.business/products.html">
<meta property="og:image" content="https://aims.business/og.png">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f3; --surface:#ffffff; --panel:#f4f1ea; --ink:#16171b; --muted:#6b6c72; --line:#e8e4db;
  --gold:#F2A900; --gold-deep:#b97f00;
  --sans:"Geist",system-ui,-apple-system,sans-serif; --mono:"Geist Mono",ui-monospace,monospace; --serif:"Playfair Display",Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:0 clamp(18px,3vw,32px)}
a{color:inherit;text-decoration:none}

.nav{position:sticky;top:0;z-index:10;background:rgba(250,248,243,.9);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav .bar{display:flex;align-items:center;gap:22px;height:64px}
.brand{display:flex;align-items:baseline;gap:9px}
.brand .logo{font-weight:700;font-size:21px;letter-spacing:.04em}
.brand .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.nav nav{display:flex;gap:20px;margin-left:18px}
.nav nav a{font-size:14px;color:var(--muted);font-weight:500}
.nav nav a:hover,.nav nav a.on{color:var(--ink)}
.nav .sp{flex:1}
.cart{font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 15px;cursor:pointer}

.hero{padding:clamp(34px,6vw,60px) 0 clamp(20px,3vw,30px)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);font-weight:500}
.hero h1{font-family:var(--serif);font-weight:700;font-size:clamp(32px,5vw,52px);line-height:1.02;margin:14px 0 0;letter-spacing:-.01em}
.byline{font-family:var(--serif);font-weight:700;font-size:clamp(18px,2.4vw,26px);color:var(--gold-deep);margin-top:4px;white-space:nowrap}
.hero p{font-size:clamp(15px,1.7vw,17px);color:var(--muted);margin-top:16px;max-width:520px;line-height:1.55}

.shop{padding:clamp(10px,2vw,16px) 0 clamp(40px,6vw,72px)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:clamp(16px,2vw,22px)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px 22px 20px;transition:box-shadow .18s,transform .18s;display:flex;flex-direction:column;min-height:188px}
.card:hover{transform:translateY(-3px);box-shadow:0 18px 36px -22px rgba(20,22,26,.4)}
.card .cat{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep)}
.card .pname{font-family:var(--serif);font-weight:600;font-size:23px;margin-top:10px;letter-spacing:-.01em}
.card .desc{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5;flex:1}
.card .desc.tbd{color:#a9aab0;font-style:italic}
.card .go{margin-top:14px;font-size:13.5px;font-weight:600;color:var(--ink)}
.card .go .arw{color:var(--gold)}
.card .lane{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 9px}

footer{border-top:1px solid var(--line);background:var(--surface)}
footer .ft{display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:26px 0;font-size:13px;color:var(--muted)}
footer .by{font-weight:700;color:var(--ink);letter-spacing:.02em}
footer .by b{color:var(--gold-deep)}
footer .tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
footer .sp{flex:1}
footer a:hover{color:var(--ink)}
@media (max-width:720px){ .nav nav{display:none} }
</style>
</head>
<body>
  <header class="nav"><div class="wrap"><div class="bar">
    <a class="brand" href="/"><span class="logo">A.I.M.S. MARKETPLACE</span><span class="tag">by: ACHIEVEMOR</span></a>
    <nav><a href="products.html" class="on">Products</a><a href="shop.html">Shop</a><a href="/">Home</a></nav>
    <div class="sp"></div>
    <a class="cart" href="shop.html">Shop ↓</a>
  </div></div></header>

  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">aims.business · products</div>
      <h1>Digital Products</h1>
      <div class="byline">by: ACHIEVEMOR</div>
      <p>The ACHIEVEMOR line — apps, managed AI, consulting, and courses. Pick a product to learn more.</p>
    </section>

    <section class="shop">
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <footer><div class="wrap"><div class="ft">
    <span class="by">by: <b>ACHIEVEMOR</b></span>
    <span class="tag">Empowering Innovation</span>
    <span class="sp"></span>
    <a href="shop.html">Shop</a><a href="/">Home</a><a>aims.business</a>
  </div></div></footer>

<script>
/* Real product NAMES only. One-liners, prices and CTA wording are owner-confirmed — not invented here.
   cat = factual category label. lane = billing lane (card | invoice | link). */
const PRODUCTS=[
 {name:"SQWAADRUN", cat:"Careers", desc:"Career Search Sqwaad — job matching across employer hiring boards.", lane:"App", href:"sqwaadrun.html"},
 {name:"Spinner", cat:"App", desc:"Real-time AI companion app.", lane:"App", href:"spinner.html", tbd:false},
 {name:"Charlotte", cat:"Managed AI", desc:"Positioning — pending owner copy.", lane:"App", href:"#", tbd:true},
 {name:"ACHEEVY", cat:"Consulting", desc:"Digital-CEO consulting & advisory — workshops and training.", lane:"Invoice", href:"#", tbd:false},
 {name:"CTI", cat:"Courses", desc:"Coastal Talent & Innovation — courses & training.", lane:"Invoice", href:"https://partners.foai.cloud", tbd:false},
];
const g=document.getElementById('grid');
PRODUCTS.forEach(p=>{
 const d=document.createElement('a'); d.className='card'; d.href=p.href;
 if(p.href.startsWith('http')){d.target='_blank';d.rel='noopener';}
 d.innerHTML=`<div class="cat">${p.cat}</div>
   <div class="pname">${p.name}</div>
   <div class="desc${p.tbd?' tbd':''}">${p.desc}</div>
   <div class="go">Learn more <span class="arw">→</span></div>`;
 g.appendChild(d);
});
</script>
</body>
</html>
